name: gyaanpath
description: "Free 100% offline education app for rural India. SSC + CBSE. No internet required."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF Viewer
  pdfx: ^2.6.0

  # State Management
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^13.2.0

  # File sharing (video via bluetooth)
  share_plus: ^9.0.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  # UI
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  flutter_markdown: ^0.6.23

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/pdfs/ssc/class_10/
    - assets/pdfs/cbse/class_10/
    - assets/images/
    - assets/fonts/
